<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GagaPet Matcher</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>GagaPet Matcher</h1>
    <p>Find a pet soulmate for Mother Monster's song</p>

    <button id="match-btn" onclick="generatePetMatch()">GENERATE</button>

    <div id="result-card">
        <img id="pet-img" src="" alt="Random pet">
        <h2 id="song-name">Song name</h2>
        <img id="cover-img" src="" alt="Cover">
        <br>
        <audio id="audio-player" controls src=""></audio>
    </div>

    <script src="matcher.js"></script>
</body>
</html>
